<html lang="es">

<meta charset="UTF-8">

<title>MotoAR — Catálogo y Comparador</title>
<style>
:root{
  --bg:#0d0f13;--bg2:#14171e;--card:#191c24;--card2:#1e2129;
  --line:#252830;--line2:#2e3240;
  --txt:#eef0f4;--muted:#8a909c;--muted2:#6b7180;
  --accent:#e2231a;--accent2:#ff5b4d;
  --gold:#d4a853;--gold2:#f0c877;
  --green:#3ddc84;--blue:#4ca5ff;
  --radius:14px;--sidebar:260px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--txt);line-height:1.5;
  display:flex;flex-direction:column;min-height:100vh;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:40;
  background:rgba(13,15,19,.92);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line2);
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;gap:16px;}
.logo{font-size:22px;font-weight:900;letter-spacing:-0.5px;
  display:flex;align-items:center;gap:8px;cursor:pointer;}
.logo .dot{width:9px;height:9px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 12px var(--accent2);}
.logo .sub{color:var(--muted2);font-size:12px;font-weight:500;letter-spacing:.3px;margin-top:2px;}
.topright{display:flex;align-items:center;gap:10px;}
.searchbox{display:flex;align-items:center;gap:8px;
  background:var(--card2);border:1px solid var(--line2);border-radius:999px;
  padding:8px 16px;min-width:220px;}
.searchbox input{background:none;border:none;outline:none;color:var(--txt);
  font-size:14px;width:100%;}
.searchbox input::placeholder{color:var(--muted2);}
.cmpbtn{background:var(--gold);color:#1a1408;font-weight:800;
  padding:9px 18px;border-radius:999px;border:none;cursor:pointer;
  font-size:13px;display:flex;align-items:center;gap:7px;white-space:nowrap;
  transition:.2s;}
.cmpbtn:hover{background:var(--gold2);}
.cmpbtn .cnt{background:#1a1408;color:var(--gold);border-radius:999px;
  padding:1px 7px;font-size:11px;}

/* LAYOUT */
.layout{display:flex;flex:1;}

/* SIDEBAR */
aside{width:var(--sidebar);flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--line);
  position:sticky;top:57px;height:calc(100vh - 57px);
  overflow-y:auto;padding:20px 0;}
aside::-webkit-scrollbar{width:4px;}
aside::-webkit-scrollbar-track{background:transparent;}
aside::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px;}
.aside-section{padding:0 16px 18px;}
.aside-title{font-size:10px;font-weight:800;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--muted2);margin-bottom:10px;}
.filter-item{display:flex;align-items:center;gap:9px;padding:7px 10px;
  border-radius:9px;cursor:pointer;font-size:13px;color:var(--muted);
  transition:.15s;margin-bottom:2px;user-select:none;}
.filter-item:hover{background:var(--card2);color:var(--txt);}
.filter-item.active{background:rgba(226,35,26,.12);color:var(--accent2);
  font-weight:600;}
.filter-item .fi-dot{width:8px;height:8px;border-radius:50%;
  background:var(--line2);flex-shrink:0;transition:.15s;}
.filter-item.active .fi-dot{background:var(--accent2);}
.filter-item .fi-count{margin-left:auto;font-size:11px;color:var(--muted2);}
.cc-range{padding:0 4px;}
.cc-range input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer;}
.cc-labels{display:flex;justify-content:space-between;font-size:11px;
  color:var(--muted2);margin-top:4px;}
.hr{height:1px;background:var(--line);margin:4px 0 18px;}
.clear-btn{width:100%;padding:8px;border-radius:9px;border:1px solid var(--line2);
  background:transparent;color:var(--muted);cursor:pointer;font-size:12px;
  font-weight:600;margin-top:6px;}
.clear-btn:hover{color:var(--txt);border-color:var(--txt);}

/* MAIN */
main{flex:1;padding:24px 28px 60px;}
.results-bar{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;gap:12px;}
.results-bar .rcount{font-size:14px;color:var(--muted);}
.results-bar .rcount b{color:var(--txt);}
.sort-sel{background:var(--card2);border:1px solid var(--line2);
  border-radius:999px;color:var(--txt);padding:6px 14px;font-size:13px;
  cursor:pointer;outline:none;}

/* GRID */
.grid{display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;}
.card{background:linear-gradient(160deg,var(--card2),var(--card));
  border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;display:flex;flex-direction:column;
  transition:.22s;position:relative;cursor:pointer;}
.card:hover{transform:translateY(-3px);border-color:var(--line2);
  box-shadow:0 16px 40px -18px rgba(0,0,0,.7);}
.card .segtag{position:absolute;top:10px;left:10px;z-index:2;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  padding:3px 9px;font-size:10px;font-weight:700;
  border-radius:999px;letter-spacing:.5px;text-transform:uppercase;
  color:var(--gold);border:1px solid rgba(212,168,83,.35);}
.card .chk{position:absolute;top:10px;right:10px;z-index:3;}
.card .chk input{width:20px;height:20px;accent-color:var(--gold);cursor:pointer;}
.imgwrap{height:175px;background:#0b0c10;overflow:hidden;position:relative;}
.imgwrap img{width:100%;height:100%;object-fit:cover;transition:.4s;}
.card:hover .imgwrap img{transform:scale(1.07);}
.cbody{padding:14px 16px 16px;display:flex;flex-direction:column;gap:8px;flex:1;}
.brandline{font-size:11px;color:var(--accent2);font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;}
.cbody h3{font-size:16px;font-weight:800;line-height:1.2;}
.mini-specs{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px;
  font-size:11.5px;color:var(--muted);
  border-top:1px dashed var(--line2);padding-top:8px;}
.mini-specs b{color:var(--txt);font-weight:700;}
.card-actions{display:flex;gap:7px;margin-top:auto;padding-top:4px;}
.cbtn{flex:1;text-align:center;padding:9px 8px;border-radius:9px;
  font-weight:700;font-size:12px;cursor:pointer;border:1px solid var(--line2);
  transition:.15s;}
.cbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.cbtn.primary:hover{background:var(--accent2);}
.cbtn.ghost{background:transparent;color:var(--muted);}
.cbtn.ghost:hover{color:var(--txt);border-color:var(--muted);}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;
  color:var(--muted);font-size:16px;}

/* DETAIL PANEL — Nike/Adidas style */
.panel-overlay{display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:60;
  align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto;}
.panel-overlay.show{display:flex;}
.panel{background:var(--bg2);border:1px solid var(--line2);border-radius:20px;
  max-width:1020px;width:100%;display:grid;grid-template-columns:1fr 1fr;
  overflow:hidden;position:relative;min-height:580px;}
.panel-close{position:absolute;top:16px;right:16px;z-index:5;
  background:rgba(0,0,0,.5);border:1px solid var(--line2);
  border-radius:50%;width:36px;height:36px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:18px;color:var(--muted);
  backdrop-filter:blur(4px);transition:.15s;}
.panel-close:hover{color:var(--txt);border-color:var(--muted);}
/* left: gallery */
.panel-gallery{background:#0b0c10;position:relative;display:flex;
  flex-direction:column;}
.panel-main-img{flex:1;overflow:hidden;min-height:320px;}
.panel-main-img img{width:100%;height:100%;object-fit:cover;
  transition:.4s;display:block;}
.panel-thumbs{display:flex;gap:6px;padding:10px;background:#0e0f14;
  overflow-x:auto;}
.panel-thumbs::-webkit-scrollbar{height:3px;}
.panel-thumbs::-webkit-scrollbar-thumb{background:var(--line2);}
.thumb{width:64px;height:50px;border-radius:7px;overflow:hidden;
  border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:.15s;}
.thumb.active{border-color:var(--gold);}
.thumb img{width:100%;height:100%;object-fit:cover;}
/* right: info */
.panel-info{padding:32px 30px 28px;overflow-y:auto;display:flex;
  flex-direction:column;gap:16px;}
.panel-info::-webkit-scrollbar{width:3px;}
.panel-info::-webkit-scrollbar-thumb{background:var(--line2);}
.pi-seg{font-size:10px;font-weight:800;letter-spacing:1px;
  text-transform:uppercase;color:var(--gold);}
.pi-brand{font-size:12px;color:var(--accent2);font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;margin-top:2px;}
.pi-name{font-size:26px;font-weight:900;line-height:1.15;letter-spacing:-.3px;}
.pi-cc{font-size:13px;color:var(--muted);margin-top:-4px;}
.pi-divider{height:1px;background:var(--line2);}
.specs-table{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;}
.spec-item .sl{font-size:10.5px;color:var(--muted2);font-weight:600;
  text-transform:uppercase;letter-spacing:.5px;}
.spec-item .sv{font-size:14px;font-weight:700;color:var(--txt);margin-top:2px;}
.pi-actions{display:flex;flex-direction:column;gap:8px;margin-top:auto;}
.pibtn{width:100%;padding:13px 18px;border-radius:11px;
  font-weight:800;font-size:14px;cursor:pointer;border:none;
  text-align:center;text-decoration:none;display:block;transition:.2s;}
.pibtn.ml{background:var(--accent);color:#fff;}
.pibtn.ml:hover{background:var(--accent2);}
.pibtn.fi{background:transparent;border:1px solid var(--line2);
  color:var(--muted);}
.pibtn.fi:hover{color:var(--txt);border-color:var(--muted);}
.cmp-toggle{display:flex;align-items:center;gap:8px;
  font-size:13px;color:var(--muted);cursor:pointer;}
.cmp-toggle input{accent-color:var(--gold);width:17px;height:17px;}

/* COMPARE MODAL */
.cmp-overlay{display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:70;
  align-items:flex-start;justify-content:center;padding:30px 16px;overflow:auto;}
.cmp-overlay.show{display:flex;}
.cmp-modal{background:var(--bg2);border:1px solid var(--line2);
  border-radius:18px;max-width:1100px;width:100%;padding:28px;
  position:relative;}
.cmp-modal h2{margin-bottom:16px;font-size:20px;}
.cmp-close{position:absolute;top:18px;right:22px;font-size:22px;
  cursor:pointer;color:var(--muted);background:none;border:none;}
.cmp-table{width:100%;border-collapse:collapse;font-size:13px;}
.cmp-table th,.cmp-table td{padding:10px 12px;
  border-bottom:1px solid var(--line);text-align:left;vertical-align:middle;}
.cmp-table th{color:var(--gold);font-size:12px;letter-spacing:.3px;
  background:var(--bg2);position:sticky;top:0;}
.cmp-table td.lbl{color:var(--muted);font-weight:600;white-space:nowrap;}
.cmp-table img{width:90px;height:58px;object-fit:cover;border-radius:7px;}
.no-cmp{color:var(--muted);text-align:center;padding:16px;font-size:14px;}

footer{border-top:1px solid var(--line);padding:24px;
  text-align:center;color:var(--muted2);font-size:12px;}
footer a{color:var(--accent2);}

@media(max-width:900px){
  .panel{grid-template-columns:1fr;}
  .panel-gallery{min-height:280px;}
}
@media(max-width:700px){
  aside{display:none;}
  main{padding:16px;}
  .grid{grid-template-columns:1fr 1fr;}
}
@media(max-width:480px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<div class="topbar">
  <div class="logo" onclick="resetAll()">
    <span class="dot"></span>
    <div>MotoAR<div class="sub">Catálogo · Comparador</div></div>
  </div>
  <div class="topright">
    <div class="searchbox">
      <svg width="14" height="14" fill="none" stroke="#8a909c" stroke-width="2"
        viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Buscar marca o modelo…"
        oninput="render()">
    </div>
    <button class="cmpbtn" onclick="openCompare()">
      ⚖ Comparar <span class="cnt" id="cmpCount">0</span>
    </button>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <aside>
    <div class="aside-section">
      <div class="aside-title">Segmento</div>
      <div id="segFilters"></div>
    </div>
    <div class="hr"></div>
    <div class="aside-section">
      <div class="aside-title">Cilindrada (cc)</div>
      <div class="cc-range" style="margin-top:6px;">
        <input type="range" id="ccMin" min="70" max="754" value="70" step="1"
          oninput="updateCC()">
        <input type="range" id="ccMax" min="70" max="754" value="754" step="1"
          oninput="updateCC()">
      </div>
      <div class="cc-labels">
        <span id="ccMinLabel">70 cc</span>
        <span id="ccMaxLabel">754 cc</span>
      </div>
      <div style="margin-top:10px;">
        <div class="aside-title" style="margin-bottom:6px;">Rango rápido</div>
        <div id="ccPresets"></div>
      </div>
    </div>
    <div class="hr"></div>
    <div class="aside-section">
      <div class="aside-title">Marca</div>
      <div id="brandFilters"></div>
    </div>
    <div class="aside-section">
      <button class="clear-btn" onclick="resetAll()">✕ Limpiar filtros</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main>
    <div class="results-bar">
      <div class="rcount" id="rcount"></div>
      <select class="sort-sel" id="sortSel" onchange="render()">
        <option value="az">A → Z</option>
        <option value="ccasc">CC ↑ menor a mayor</option>
        <option value="ccdesc">CC ↓ mayor a menor</option>
      </select>
    </div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<!-- DETAIL PANEL -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanelIfBG(event)">
  <div class="panel" id="panel">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div class="panel-gallery">
      <div class="panel-main-img"><img id="pMainImg" src="" alt=""></div>
      <div class="panel-thumbs" id="pThumbs"></div>
    </div>
    <div class="panel-info" id="pInfo"></div>
  </div>
</div>

<!-- COMPARE MODAL -->
<div class="cmp-overlay" id="cmpOverlay" onclick="closeCmpIfBG(event)">
  <div class="cmp-modal">
    <button class="cmp-close" onclick="closeCompare()">✕</button>
    <h2>Comparador de motos</h2>
    <div id="cmpContent"></div>
  </div>
</div>

<footer>

// Placeholder img (usamos og:image de motozuni.com en base al segmento)
const SEG_COLOR = {CUB:"#d4a853",NAKED:"#ff5b4d","ON OFF":"#3ddc84",ENDURO:"#4ca5ff",
  SCOOTER:"#c084fc",ADVENTURE:"#fb923c",STREET:"#60a5fa",SPORT:"#f43f5e",
  CUSTOM:"#a78bfa",CHOPPER:"#94a3b8",UTILITARIO:"#84cc16",DAX:"#fbbf24",CUATRI:"#f97316"};

const FALLBACKimgs = {
  CUB:"https://motozuni.com/images/catalogue/MOTO-ECONO.webp",
  NAKED:"https://motozuni.com/images/catalogue/MOTO-CALLE.webp",
  "ON OFF":"https://motozuni.com/images/catalogue/MOTO-ENDURO.webp",
  ENDURO:"https://motozuni.com/images/catalogue/MOTO-ENDURO.webp",
  SCOOTER:"https://motozuni.com/images/catalogue/MOTO-SCOOTER.webp",
  ADVENTURE:"https://motozuni.com/images/catalogue/MOTO-ENDURO.webp",
  STREET:"https://motozuni.com/images/catalogue/MOTO-CALLE.webp",
  SPORT:"https://motozuni.com/images/catalogue/MOTO-CALLE.webp",
  CUSTOM:"https://motozuni.com/images/catalogue/MOTO-CALLE.webp",
  CHOPPER:"https://motozuni.com/images/catalogue/MOTO-CALLE.webp",
  UTILITARIO:"https://motozuni.com/images/catalogue/CUATRI-UTILITARIO.webp",
  DAX:"https://motozuni.com/images/catalogue/MOTO-ECONO.webp",
  CUATRI:"https://motozuni.com/images/catalogue/CUATRI-UTILITARIO.webp",
};

let activeSeg = null;
let activeBrand = null;
let ccMin = 70, ccMax = 754;
let selected = new Set();

const segs = [...new Set(MOTOS.map(m=>m.seg))].sort();
const brands = [...new Set(MOTOS.map(m=>m.marca))].sort();

function buildSidebar(){
  // segments
  const sf = document.getElementById('segFilters');
  [null,...segs].forEach(s=>{
    const label = s ? s : 'Todos';
    const count = s ? MOTOS.filter(m=>m.seg===s).length : MOTOS.length;
    const d = document.createElement('div');
    d.className='filter-item'+(activeSeg===s?' active':'');
    d.innerHTML=`<span class="fi-dot"></span>${label}<span class="fi-count">${count}</span>`;
    d.onclick=()=>{activeSeg=s;buildSidebar();render();};
    sf.appendChild(d);
  });
  // cc presets
  const presets=[[70,110,"≤110cc"],[111,150,"111–150cc"],[151,249,"151–249cc"],[250,400,"250–400cc"],[401,754,"401cc+"]];
  const cp=document.getElementById('ccPresets');
  cp.innerHTML='';
  presets.forEach(([mn,mx,lbl])=>{
    const d=document.createElement('div');
    d.className='filter-item'+(ccMin===mn&&ccMax===mx?' active':'');
    d.innerHTML=`<span class="fi-dot"></span>${lbl}`;
    d.onclick=()=>{ccMin=mn;ccMax=mx;
      document.getElementById('ccMin').value=mn;
      document.getElementById('ccMax').value=mx;
      updateCCLabels();buildSidebar();render();};
    cp.appendChild(d);
  });
  // brands
  const bf=document.getElementById('brandFilters');
  bf.innerHTML='';
  brands.forEach(b=>{
    const count=MOTOS.filter(m=>m.marca===b).length;
    const d=document.createElement('div');
    d.className='filter-item'+(activeBrand===b?' active':'');
    d.innerHTML=`<span class="fi-dot"></span>${b}<span class="fi-count">${count}</span>`;
    d.onclick=()=>{activeBrand=(activeBrand===b)?null:b;buildSidebar();render();};
    bf.appendChild(d);
  });
}

function updateCC(){
  let mn=parseInt(document.getElementById('ccMin').value);
  let mx=parseInt(document.getElementById('ccMax').value);
  if(mn>mx)[mn,mx]=[mx,mn];
  ccMin=mn;ccMax=mx;
  updateCCLabels();render();buildSidebar();
}
function updateCCLabels(){
  document.getElementById('ccMinLabel').textContent=ccMin+' cc';
  document.getElementById('ccMaxLabel').textContent=ccMax+' cc';
}
function resetAll(){
  activeSeg=null;activeBrand=null;ccMin=70;ccMax=754;
  document.getElementById('ccMin').value=70;
  document.getElementById('ccMax').value=754;
  document.getElementById('search').value='';
  selected.clear();updateCmpCount();
  updateCCLabels();buildSidebar();render();
}

function getFiltered(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  let arr=MOTOS.filter(m=>{
    if(activeSeg && m.seg!==activeSeg) return false;
    if(activeBrand && m.marca!==activeBrand) return false;
    if(m.cc<ccMin || m.cc>ccMax) return false;
    if(q && !(m.marca.toLowerCase().includes(q)||m.modelo.toLowerCase().includes(q))) return false;
    return true;
  });
  const sort=document.getElementById('sortSel').value;
  if(sort==='az') arr.sort((a,b)=>(a.marca+a.modelo).localeCompare(b.marca+b.modelo));
  if(sort==='ccasc') arr.sort((a,b)=>a.cc-b.cc);
  if(sort==='ccdesc') arr.sort((a,b)=>b.cc-a.cc);
  return arr;
}

function render(){
  const arr=getFiltered();
  const grid=document.getElementById('grid');
  document.getElementById('rcount').innerHTML=
    `<b>${arr.length}</b> modelos encontrados`;
  if(!arr.length){
    grid.innerHTML='<div class="empty">No hay motos que coincidan con los filtros.</div>';
    return;
  }
  grid.innerHTML='';
  arr.forEach(m=>{
    const idx=MOTOS.indexOf(m);
    const specs=SPECS[m.slug]||{};
    const card=document.createElement('div');
    card.className='card';
    card.onclick=(e)=>{if(e.target.type==='checkbox')return;openPanel(idx);};
    card.innerHTML=`
      <div class="segtag">${m.seg}</div>
      <div class="chk"><input type="checkbox" data-i="${idx}"
        ${selected.has(idx)?'checked':''}
        onclick="e=>e.stopPropagation()"
        onchange="toggleSel(${idx},this)"></div>
      <div class="imgwrap">
        <img src="${m.img}" alt="${m.marca} ${m.modelo}" loading="lazy"
          onerror="this.src='${FALLBACKimgs[m.seg]||FALLBACKimgs.NAKED}'">
      </div>
      <div class="cbody">
        <div class="brandline">${m.marca}</div>
        <h3>${m.modelo}</h3>
        <div class="mini-specs">
          <div>${m.cc} cc <b>${m.seg}</b></div>
          <div>${specs.pot||'—'}</div>
          <div>${specs.trans||'—'}</div>
          <div>${specs.peso||'—'}</div>
        </div>
        <div class="card-actions">
          <a class="cbtn primary" href="${m.ml}" target="_blank"
            onclick="event.stopPropagation()">Ver en ML</a>
          <span class="cbtn ghost" onclick="event.stopPropagation();openPanel(${idx})">Ver ficha</span>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function toggleSel(i,el){
  if(el.checked){
    if(selected.size>=4){
      alert('Podés comparar hasta 4 motos a la vez.');
      el.checked=false;return;
    }
    selected.add(i);
  } else selected.delete(i);
  updateCmpCount();
}
function updateCmpCount(){
  document.getElementById('cmpCount').textContent=selected.size;
}

// ── PANEL ──
function openPanel(idx){
  const m=MOTOS[idx];
  const specs=SPECS[m.slug]||{};
  const imgs=[m.img];
  // main img
  document.getElementById('pMainImg').src=m.img;
  document.getElementById('pMainImg').alt=m.marca+' '+m.modelo;
  // thumbs
  const th=document.getElementById('pThumbs');
  th.innerHTML='';
  imgs.forEach((src,i)=>{
    const d=document.createElement('div');
    d.className='thumb'+(i===0?' active':'');
    d.innerHTML=`<img src="${src}" loading="lazy"
      onerror="this.src='${FALLBACKimgs[m.seg]||FALLBACKimgs.NAKED}'">`;
    d.onclick=()=>{
      document.getElementById('pMainImg').src=src;
      th.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));
      d.classList.add('active');
    };
    th.appendChild(d);
  });
  // info
  const specsRows=[
    ["Cilindrada",m.cc+" cc"],
    ["Segmento",m.seg],
    ["Potencia",specs.pot||"—"],
    ["Transmisión",specs.trans||"—"],
    ["Peso",specs.peso||"—"],
    ["Tanque",specs.tanque||"—"],
    ["Frenos",specs.frenos||"—"],
    ["Arranque",specs.arranque||"—"],
  ];
  const color=SEG_COLOR[m.seg]||'#d4a853';
  document.getElementById('pInfo').innerHTML=`
    <div>
      <div class="pi-seg" style="color:${color}">${m.seg}</div>
      <div class="pi-brand">${m.marca}</div>
      <div class="pi-name">${m.modelo}</div>
      <div class="pi-cc">${m.cc} cc · Motor monocilíndrico 4T</div>
    </div>
    <div class="pi-divider"></div>
    <div class="specs-table">${specsRows.map(([l,v])=>`
      <div class="spec-item"><div class="sl">${l}</div><div class="sv">${v}</div></div>`).join('')}
    </div>
    <div class="pi-divider"></div>
    <div class="pi-actions">
      <a class="pibtn ml" href="${m.ml}" target="_blank">🛒 Ver en Mercado Libre</a>
      <a class="pibtn fi" href="${m.ficha}" target="_blank">📄 Ficha oficial MotoZuni</a>
      <label class="cmp-toggle">
        <input type="checkbox" ${selected.has(idx)?'checked':''}
          onchange="toggleSelPanel(${idx},this)">
        Agregar al comparador <span style="color:var(--muted2)">(${selected.size}/4)</span>
      </label>
    </div>`;
  document.getElementById('panelOverlay').classList.add('show');
}
function toggleSelPanel(i,el){
  if(el.checked){
    if(selected.size>=4){alert('Máximo 4 motos.');el.checked=false;return;}
    selected.add(i);
  } else selected.delete(i);
  updateCmpCount();render();
}
function closePanel(){document.getElementById('panelOverlay').classList.remove('show');}
function closePanelIfBG(e){if(e.target.id==='panelOverlay')closePanel();}

// ── COMPARADOR ──
function openCompare(){
  if(selected.size<2){alert('Seleccioná al menos 2 motos (tildá el check en cada tarjeta).');return;}
  const list=[...selected].map(i=>MOTOS[i]);
  const rows=[
    ["Imagen",m=>`<img src="${m.img}" alt="${m.modelo}">`],
    ["Marca",m=>m.marca],
    ["Modelo",m=>`<b>${m.modelo}</b>`],
    ["Segmento",m=>m.seg],
    ["Cilindrada",m=>m.cc+" cc"],
    ["Potencia",m=>(SPECS[m.slug]||{}).pot||"—"],
    ["Transmisión",m=>(SPECS[m.slug]||{}).trans||"—"],
    ["Peso",m=>(SPECS[m.slug]||{}).peso||"—"],
    ["Tanque",m=>(SPECS[m.slug]||{}).tanque||"—"],
    ["Frenos",m=>(SPECS[m.slug]||{}).frenos||"—"],
    ["Arranque",m=>(SPECS[m.slug]||{}).arranque||"—"],
    ["",m=>`<a class="cbtn primary" style="display:inline-block;padding:7px 14px;text-decoration:none;border-radius:8px;font-size:12px;font-weight:800;background:var(--accent);color:#fff" href="${m.ml}" target="_blank">Ver en ML</a>`],
  ];
  let html=`<div style="overflow:auto"><table class="cmp-table">
    <tr><th>Especificación</th>${list.map(m=>`<th>${m.marca} ${m.modelo}</th>`).join('')}</tr>`;
  rows.forEach(([lbl,fn])=>{
    html+=`<tr><td class="lbl">${lbl}</td>${list.map(m=>`<td>${fn(m)}</td>`).join('')}</tr>`;
  });
  html+='</table></div>';
  document.getElementById('cmpContent').innerHTML=html;
  document.getElementById('cmpOverlay').classList.add('show');
}
function closeCompare(){document.getElementById('cmpOverlay').classList.remove('show');}
function closeCmpIfBG(e){if(e.target.id==='cmpOverlay')closeCompare();}

// Init
updateCCLabels();
buildSidebar();
render();
</script>
</body>
